<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">外部ライブラリのライフサイクル</title>
  <desc id="desc">connect で初期化し disconnect で破棄し、before-cache で片付ける流れを示すタイムライン。</desc>
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="360" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">外部ライブラリのライフサイクル</text>
  <rect x="38" y="82" width="1124" height="240" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><line x1="120" y1="190" x2="1080" y2="190" stroke="#cbd5e1" stroke-width="3" fill="none" /><rect x="90" y="140" width="140" height="80" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="160" y="168" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="160" dy="0">connect</tspan></text><text x="160" y="196" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="160" dy="0">初期化</tspan></text><line x1="230" y1="180" x2="310" y2="180" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><rect x="310" y="140" width="140" height="80" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="380" y="168" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="380" dy="0">操作</tspan></text><text x="380" y="196" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="380" dy="0">利用</tspan></text><line x1="450" y1="180" x2="530" y2="180" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><rect x="530" y="140" width="140" height="80" rx="14" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="600" y="168" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="600" dy="0">before-cache</tspan></text><text x="600" y="196" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="600" dy="0">片付け</tspan></text><line x1="670" y1="180" x2="750" y2="180" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><rect x="750" y="140" width="140" height="80" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="820" y="168" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="820" dy="0">保存</tspan></text><text x="820" y="196" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="820" dy="0">きれいなスナップショット</tspan></text><line x1="890" y1="180" x2="970" y2="180" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><rect x="970" y="140" width="140" height="80" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="1040" y="168" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1040" dy="0">disconnect</tspan></text><text x="1040" y="196" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="1040" dy="0">破棄</tspan></text>
</svg>
