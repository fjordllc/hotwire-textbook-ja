<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Rails 認証ジェネレータの生成物</title>
  <desc id="desc">bin/rails generate authentication が作る User、Session、Current、各コントローラやメール周辺を示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="460" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">Rails 認証ジェネレータの生成物</text>
  <rect x="36" y="84" width="1128" height="300" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="514" y="170" width="172" height="86" rx="18" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="600" y="202" text-anchor="middle" style="font: 700 20px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="600" dy="0">authentication</tspan></text><text x="600" y="230" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0e7490;"><tspan x="600" dy="0">ジェネレータ</tspan></text><rect x="110" y="110" width="160" height="62" rx="14" fill="#eff6ff" stroke="#cbd5e1" stroke-width="2"/><text x="190" y="148" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="190" dy="0">User</tspan></text><rect x="320" y="110" width="160" height="62" rx="14" fill="#eff6ff" stroke="#cbd5e1" stroke-width="2"/><text x="400" y="148" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="400" dy="0">Session</tspan></text><rect x="530" y="110" width="160" height="62" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="610" y="148" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="610" dy="0">Current</tspan></text><line x1="600" y1="214" x2="610" y2="141" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="740" y="110" width="160" height="62" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="820" y="148" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="820" dy="0">SessionsController</tspan></text><line x1="600" y1="214" x2="820" y2="141" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="950" y="110" width="160" height="62" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="1030" y="148" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1030" dy="0">PasswordsController</tspan></text><line x1="600" y1="214" x2="1030" y2="141" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="740" y="300" width="160" height="62" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="820" y="338" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="820" dy="0">PasswordsMailer</tspan></text><line x1="600" y1="214" x2="820" y2="331" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="950" y="300" width="160" height="62" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="1030" y="338" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1030" dy="0">views</tspan></text><line x1="600" y1="214" x2="1030" y2="331" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="530" y="300" width="160" height="62" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="610" y="338" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="610" dy="0">routes</tspan></text><line x1="600" y1="214" x2="610" y2="331" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><text x="110" y="360" text-anchor="start" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="110" dy="0">User は domain に近い</tspan></text><text x="860" y="360" text-anchor="start" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="860" dy="0">他は認証インフラ</tspan></text><text x="1080" y="202" text-anchor="start" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="1080" dy="0">bcrypt</tspan></text>
