<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Rails 認証ジェネレータの生成物</title>
  <desc id="desc">bin/rails generate authentication が作る User、Session、Current、各コントローラやメール周辺を示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="460" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">Rails 認証ジェネレータの生成物</text>
  <rect x="36" y="84" width="1128" height="300" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="92" y="170" width="230" height="94" rx="18" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="207" y="204" text-anchor="middle" style="font: 700 20px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="207" dy="0">authentication</tspan></text><text x="207" y="234" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0e7490;"><tspan x="207" dy="0">ジェネレータ</tspan></text><line x1="322" y1="217" x2="410" y2="217" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><rect x="410" y="116" width="690" height="200" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="755" y="146" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="755" dy="0">生成される主要ファイル</tspan></text><rect x="448" y="168" width="140" height="46" rx="12" fill="#eff6ff" stroke="#cbd5e1" stroke-width="2"/><text x="518" y="197" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="518" dy="0">User</tspan></text><rect x="614" y="168" width="140" height="46" rx="12" fill="#eff6ff" stroke="#cbd5e1" stroke-width="2"/><text x="684" y="197" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="684" dy="0">Session</tspan></text><rect x="780" y="168" width="140" height="46" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="850" y="197" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="850" dy="0">Current</tspan></text><rect x="946" y="168" width="140" height="46" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="1016" y="197" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1016" dy="0">routes</tspan></text><rect x="448" y="246" width="140" height="46" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="518" y="275" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="518" dy="0">SessionsController</tspan></text><rect x="614" y="246" width="140" height="46" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="684" y="275" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="684" dy="0">PasswordsController</tspan></text><rect x="780" y="246" width="140" height="46" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="850" y="275" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="850" dy="0">PasswordsMailer</tspan></text><rect x="946" y="246" width="140" height="46" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="1016" y="275" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1016" dy="0">views</tspan></text><text x="520" y="332" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="520" dy="0">User / Session はモデル層</tspan></text><text x="760" y="332" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="760" dy="0">password 系は bcrypt を使う</tspan></text><text x="972" y="332" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="972" dy="0">他は認証フローを支える部品</tspan></text>
</svg>
