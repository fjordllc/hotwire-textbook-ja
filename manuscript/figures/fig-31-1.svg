<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">配信範囲と認可の切り分け</title>
  <desc id="desc">署名付き stream 名、配信範囲、認可が別レイヤーであることを示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="400" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">配信範囲と認可の切り分け</text>
  <rect x="38" y="82" width="1124" height="260" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="120" y="144" width="240" height="110" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="240" y="176" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="240" dy="0">署名付き stream 名</tspan></text><rect x="470" y="144" width="240" height="110" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="590" y="176" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="590" dy="0">配信範囲</tspan></text><rect x="820" y="144" width="240" height="110" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="940" y="176" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="940" dy="0">認可</tspan></text><text x="240" y="220" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="240" dy="0">改ざん防止</tspan></text><text x="590" y="220" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="590" dy="0">streamable で届く範囲</tspan></text><text x="940" y="220" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="940" dy="0">controller / model</tspan></text><line x1="360" y1="199" x2="458" y2="199" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><line x1="710" y1="199" x2="808" y2="199" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><text x="600" y="120" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="600" dy="0">署名は認可ではない</tspan></text>
</svg>
