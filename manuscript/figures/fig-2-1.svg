<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">画面更新の歴史</title>
  <desc id="desc">全ページ再読み込み、Ajax、JSON+SPA、HTML over the wire の流れを示すタイムライン。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="360" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .label { font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">画面更新の歴史</text>
  <rect x="40" y="82" width="1120" height="220" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><line x1="110" y1="188" x2="1030" y2="188" stroke="#94a3b8" stroke-width="3" fill="none" /><rect x="52" y="122" width="176" height="120" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="140" y="154" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="140" dy="0">全ページ再読み込み</tspan></text><text x="140" y="182" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="140" dy="0">白い再描画</tspan></text><text x="140" y="208" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b;"><tspan x="140" dy="0">HTML 全体</tspan></text><line x1="140" y1="188" x2="140" y2="188" stroke="#0284c7" stroke-width="10" fill="none" /><rect x="312" y="122" width="176" height="120" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="400" y="154" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="400" dy="0">Ajax</tspan></text><text x="400" y="182" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="400" dy="0">部分更新の始まり</tspan></text><text x="400" y="208" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b;"><tspan x="400" dy="0">JS が通信</tspan></text><line x1="400" y1="188" x2="400" y2="188" stroke="#0284c7" stroke-width="10" fill="none" /><rect x="572" y="122" width="176" height="120" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="660" y="154" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="660" dy="0">JSON+SPA</tspan></text><text x="660" y="182" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="660" dy="0">ブラウザが画面を組み立てる</tspan></text><text x="660" y="208" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b;"><tspan x="660" dy="0">JSON</tspan></text><line x1="660" y1="188" x2="660" y2="188" stroke="#0284c7" stroke-width="10" fill="none" /><rect x="832" y="122" width="176" height="120" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="920" y="154" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0e7490;"><tspan x="920" dy="0">HTML over the wire</tspan></text><text x="920" y="182" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="920" dy="0">サーバーが HTML を返す</tspan></text><text x="920" y="208" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b;"><tspan x="920" dy="0">部分 HTML</tspan></text><line x1="920" y1="188" x2="920" y2="188" stroke="#0284c7" stroke-width="10" fill="none" /><line x1="225" y1="188" x2="325" y2="188" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><line x1="485" y1="188" x2="585" y2="188" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><line x1="745" y1="188" x2="845" y2="188" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" />
</svg>
