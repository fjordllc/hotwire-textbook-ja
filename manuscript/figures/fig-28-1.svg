<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">テストの配分</title>
  <desc id="desc">モデルテスト、リクエストテスト、System テストの配分をピラミッドで示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="960" height="420" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .label { font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">テストの配分</text>
  <rect x="34" y="74" width="892" height="300" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="180" y="270" width="600" height="58" rx="14" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><rect x="240" y="214" width="480" height="48" rx="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><rect x="300" y="168" width="360" height="40" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="480" y="304" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="480" dy="0">System テスト（少ない・遅い）</tspan></text><text x="480" y="244" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="480" dy="0">リクエストテスト（中）</tspan></text><text x="480" y="194" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="480" dy="0">モデルテスト（多い・速い）</tspan></text><text x="480" y="126" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #075985;"><tspan x="480" dy="0">Hotwire の結合を System で守る</tspan></text>
</svg>
