<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Hotwire と SPA の比較軸</title>
  <desc id="desc">描画・状態・通信・JavaScript 量の 4 軸で Hotwire と SPA の位置を対比する図。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .label { font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">Hotwire と SPA の比較軸</text>
  <rect x="42" y="82" width="1116" height="280" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><line x1="260" y1="132" x2="920" y2="132" stroke="#cbd5e1" stroke-width="3" fill="none" /><text x="118" y="138" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="118" dy="0">描画</tspan></text><text x="250" y="138" text-anchor="start" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="250" dy="0">サーバー</tspan></text><text x="922" y="138" text-anchor="end" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="922" dy="0">クライアント</tspan></text><line x1="260" y1="188" x2="920" y2="188" stroke="#cbd5e1" stroke-width="3" fill="none" /><text x="118" y="194" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="118" dy="0">状態</tspan></text><text x="250" y="194" text-anchor="start" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="250" dy="0">サーバー</tspan></text><text x="922" y="194" text-anchor="end" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="922" dy="0">クライアント</tspan></text><line x1="260" y1="244" x2="920" y2="244" stroke="#cbd5e1" stroke-width="3" fill="none" /><text x="118" y="250" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="118" dy="0">通信</tspan></text><text x="250" y="250" text-anchor="start" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="250" dy="0">HTML</tspan></text><text x="922" y="250" text-anchor="end" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="922" dy="0">JSON</tspan></text><line x1="260" y1="300" x2="920" y2="300" stroke="#cbd5e1" stroke-width="3" fill="none" /><text x="118" y="306" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="118" dy="0">JavaScript 量</tspan></text><text x="250" y="306" text-anchor="start" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="250" dy="0">少</tspan></text><text x="922" y="306" text-anchor="end" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="922" dy="0">多</tspan></text><rect x="250" y="112" width="120" height="26" rx="10" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="310" y="130" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0e7490;"><tspan x="310" dy="0">Hotwire</tspan></text><rect x="790" y="112" width="120" height="26" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="850" y="130" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #92400e;"><tspan x="850" dy="0">SPA</tspan></text><text x="600" y="356" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="600" dy="0">境界は SSR メタフレームワークでぼやける</tspan></text>
</svg>
