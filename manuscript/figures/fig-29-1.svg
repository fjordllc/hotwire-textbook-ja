<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">デバッグの切り分け順</title>
  <desc id="desc">Network→Turbo イベント→Stimulus 接続→target id→morph の順で不具合を絞る手順図。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .label { font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">デバッグの切り分け順</text>
  <rect x="32" y="72" width="1136" height="300" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="88" y="148" width="170" height="66" rx="14" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="173" y="176" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="173" dy="0">Network</tspan></text><text x="173" y="198" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="173" dy="0">メソッド / Accept / status</tspan></text><line x1="258" y1="181" x2="286" y2="181" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="304" y="148" width="170" height="66" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="389" y="176" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="389" dy="0">Turbo events</tspan></text><text x="389" y="198" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="389" dy="0">動いているか</tspan></text><line x1="474" y1="181" x2="502" y2="181" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="520" y="148" width="170" height="66" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="605" y="176" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="605" dy="0">Stimulus</tspan></text><text x="605" y="198" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="605" dy="0">connect ログ</tspan></text><line x1="690" y1="181" x2="718" y2="181" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="736" y="148" width="170" height="66" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="821" y="176" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="821" dy="0">target</tspan></text><text x="821" y="198" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="821" dy="0">id 一致</tspan></text><line x1="906" y1="181" x2="934" y2="181" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="952" y="148" width="170" height="66" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="1037" y="176" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1037" dy="0">morph</tspan></text><text x="1037" y="198" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="1037" dy="0">差分の適用</tspan></text><text x="600" y="118" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="600" dy="0">原因を狭める順番</tspan></text>
</svg>
