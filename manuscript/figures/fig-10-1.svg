<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">visit ライフサイクルのイベント</title>
  <desc id="desc">Turbo の visit 中に発火する主要イベントの順序と、フォームや morph のイベントを示すタイムライン。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">visit ライフサイクルのイベント</text>
  <rect x="36" y="84" width="1128" height="260" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="92" y="170" width="150" height="54" rx="14" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="167" y="203" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="167" dy="0">turbo:click</tspan></text><line x1="242" y1="197" x2="268" y2="197" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="268" y="170" width="150" height="54" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="343" y="203" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="343" dy="0">before-visit</tspan></text><line x1="418" y1="197" x2="444" y2="197" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="444" y="170" width="150" height="54" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="519" y="203" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="519" dy="0">visit</tspan></text><line x1="594" y1="197" x2="620" y2="197" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="620" y="170" width="150" height="54" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="695" y="203" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="695" dy="0">before-render</tspan></text><line x1="770" y1="197" x2="796" y2="197" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="796" y="170" width="150" height="54" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="871" y="203" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="871" dy="0">render</tspan></text><line x1="946" y1="197" x2="972" y2="197" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="972" y="170" width="150" height="54" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="1047" y="203" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1047" dy="0">load</tspan></text><text x="600" y="128" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="600" dy="0">中断できるのは before-visit</tspan></text><text x="600" y="314" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="600" dy="0">submit-start / submit-end / before-morph-element も別レーン</tspan></text>
</svg>
