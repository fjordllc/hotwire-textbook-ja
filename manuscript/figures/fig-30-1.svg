<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">N+1 と includes</title>
  <desc id="desc">一覧描画で N+1 が起きる様子と、includes で解消する様子をクエリ本数で対比する図。</desc>
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="400" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">N+1 と includes</text>
  <rect x="38" y="82" width="1124" height="260" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="82" y="138" width="460" height="150" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="658" y="138" width="460" height="150" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="312" y="168" text-anchor="middle" style="font: 700 20px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="312" dy="0">N+1</tspan></text><text x="312" y="196" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #b91c1c;"><tspan x="312" dy="0">1 + 20 + 20 ...</tspan></text><text x="312" y="224" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="312" dy="0">クエリが増える</tspan></text><text x="888" y="168" text-anchor="middle" style="font: 700 20px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #075985;"><tspan x="888" dy="0">includes</tspan></text><text x="888" y="196" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #075985;"><tspan x="888" dy="0">まとめて数本</tspan></text><text x="888" y="224" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="888" dy="0">broadcast の partial でも同じ</tspan></text><line x1="150" y1="258" x2="470" y2="258" stroke="#ef4444" stroke-width="10" fill="none" /><line x1="726" y1="258" x2="1046" y2="258" stroke="#0284c7" stroke-width="10" fill="none" />
</svg>
