<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">状態を HTML に置く</title>
  <desc id="desc">状態を data 属性に置けばスナップショットに乗るが、JS のインスタンス変数だけだと差し替えで失われることを対比する図。</desc>
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="360" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">状態を HTML に置く</text>
  <rect x="38" y="82" width="1124" height="240" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="90" y="138" width="420" height="116" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><rect x="690" y="138" width="420" height="116" rx="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="300" y="168" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="300" dy="0">HTML に状態</tspan></text><text x="300" y="196" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="300" dy="0">data-...-value / class</tspan></text><text x="300" y="224" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0e7490;"><tspan x="300" dy="0">スナップショットに含まれる</tspan></text><text x="900" y="168" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="900" dy="0">JS だけに状態</tspan></text><text x="900" y="196" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="900" dy="0">controller の instance variable</tspan></text><text x="900" y="224" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #b45309;"><tspan x="900" dy="0">差し替えで消える</tspan></text><line x1="510" y1="196" x2="682" y2="196" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" />
</svg>
