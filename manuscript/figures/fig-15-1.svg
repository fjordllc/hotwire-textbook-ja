<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">Turbo Streams のレスポンスと DOM 更新</title>
  <desc id="desc">turbo-stream 要素の action・target・template の構造と、それが対象 id の DOM をどう操作するかを示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="960" height="320" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .label { font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">Turbo Streams のレスポンスと DOM 更新</text>
  <rect x="34" y="72" width="892" height="200" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="78" y="116" width="320" height="108" rx="14" fill="#eff6ff" stroke="#0284c7" stroke-width="2"/><rect x="520" y="116" width="360" height="108" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="238" y="148" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="238" dy="0">&lt;turbo-stream action=&quot;append&quot;&gt;</tspan></text><text x="238" y="180" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="238" dy="0">&lt;template&gt;...&lt;/template&gt;</tspan></text><text x="700" y="148" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="700" dy="0">&lt;div id=&quot;tasks&quot;&gt;</tspan></text><text x="700" y="182" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="700" dy="0">append / prepend / replace ...</tspan></text><line x1="410" y1="170" x2="508" y2="170" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><text x="459" y="150" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b;"><tspan x="459" dy="0">HTML</tspan></text>
</svg>
