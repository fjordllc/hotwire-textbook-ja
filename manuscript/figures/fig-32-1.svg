<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">WebView と native shell</title>
  <desc id="desc">スマホの外枠の中に、ネイティブのナビゲーションバーと Relay の WebView を配した構成図。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="960" height="420" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .label { font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">WebView と native shell</text>
  <rect x="190" y="78" width="580" height="300" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="240" y="116" width="480" height="56" rx="18" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="480" y="150" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="480" dy="0">native shell</tspan></text><rect x="250" y="192" width="460" height="152" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="480" y="242" text-anchor="middle" style="font: 700 20px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="480" dy="0">WebView</tspan></text><text x="480" y="272" text-anchor="middle" style="font: 600 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="480" dy="0">Relay の HTML</tspan></text><text x="480" y="314" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="480" dy="0">ナビゲーションは native / 中身は Web</tspan></text><text x="480" y="44" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="480" dy="0">Web と native の役割分担</tspan></text>
</svg>
