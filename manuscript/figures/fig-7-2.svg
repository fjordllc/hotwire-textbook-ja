  </defs>
  <rect width="1200" height="420" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">visit のシーケンス</text>
  <rect x="38" y="82" width="1124" height="280" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="44" y="118" width="152" height="44" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="120" y="146" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="120" dy="0">User</tspan></text><rect x="424" y="118" width="152" height="44" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="500" y="146" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="500" dy="0">Turbo</tspan></text><rect x="804" y="118" width="152" height="44" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="880" y="146" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="880" dy="0">Server</tspan></text><line x1="196" y1="188" x2="452" y2="188" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><text x="320" y="176" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="320" dy="0">click</tspan></text><line x1="548" y1="238" x2="832" y2="238" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><text x="690" y="226" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="690" dy="0">fetch</tspan></text><line x1="832" y1="288" x2="548" y2="288" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><text x="690" y="276" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="690" dy="0">HTML</tspan></text><line x1="452" y1="338" x2="548" y2="338" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><text x="500" y="326" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="500" dy="0">body 差し替え + head マージ</tspan></text><text x="600" y="356" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0e7490;"><tspan x="600" dy="0">サーバーは通常どおり HTML を返すだけ</tspan></text>
