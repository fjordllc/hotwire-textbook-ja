    </marker>
  </defs>
  <rect width="960" height="420" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .label { font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">フォーム送信の契約</text>
  <rect x="36" y="72" width="888" height="300" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="360" y="106" width="240" height="52" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="480" y="139" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="480" dy="0">フォーム送信</tspan></text><line x1="480" y1="158" x2="480" y2="190" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="170" y="198" width="220" height="68" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><rect x="570" y="198" width="220" height="68" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="280" y="226" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="280" dy="0">成功</tspan></text><text x="280" y="250" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #047857;"><tspan x="280" dy="0">redirect / 303</tspan></text><text x="680" y="226" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="680" dy="0">失敗</tspan></text><text x="680" y="250" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #92400e;"><tspan x="680" dy="0">render / 422</tspan></text><line x1="360" y1="233" x2="390" y2="233" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><line x1="580" y1="233" x2="550" y2="233" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="340" y="300" width="280" height="54" rx="14" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="480" y="333" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #b91c1c;"><tspan x="480" dy="0">200 は差し替わらない</tspan></text>
