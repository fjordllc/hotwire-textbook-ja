<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">dom_id が表示側と命令側を揃える</title>
  <desc id="desc">dom_id(task) が表示側の frame id と stream target をどちらも task_1 に揃えることを示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="360" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">dom_id が表示側と命令側を揃える</text>
  <rect x="38" y="82" width="1124" height="240" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="86" y="140" width="272" height="88" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="464" y="140" width="272" height="88" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><rect x="842" y="140" width="272" height="88" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="222" y="168" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="222" dy="0">表示側</tspan></text><text x="222" y="194" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="222" dy="0">turbo_frame_tag task</tspan></text><text x="600" y="168" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #075985;"><tspan x="600" dy="0">dom_id(@task)</tspan></text><text x="600" y="194" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #075985;"><tspan x="600" dy="0">task_1</tspan></text><text x="978" y="168" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="978" dy="0">命令側</tspan></text><text x="978" y="194" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="978" dy="0">turbo_stream.replace @task</tspan></text><line x1="358" y1="184" x2="456" y2="184" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><line x1="736" y1="184" x2="834" y2="184" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><text x="600" y="286" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #b91c1c;"><tspan x="600" dy="0">手書き id はずれる</tspan></text>
</svg>
