<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">主要画面と使う技術の対応</title>
  <desc id="desc">Relay の主要画面に Turbo Drive、Frames、Streams、Stimulus、Action Cable を対応づけた図。</desc>
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="460" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">主要画面と使う技術の対応</text>
  <rect x="36" y="84" width="1128" height="330" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="66" y="126" width="320" height="108" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="226" y="158" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="226" dy="0">プロジェクト一覧 / 詳細</tspan></text><rect x="114" y="180" width="224" height="34" rx="12" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="226" y="202" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="226" dy="0">Drive</tspan></text><rect x="422" y="126" width="320" height="108" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="582" y="158" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="582" dy="0">タスク一覧（リスト / ボード）</tspan></text><rect x="470" y="180" width="224" height="46" rx="12" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="582" y="202" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="582" dy="0">Frames</tspan><tspan x="582" dy="17">Stimulus</tspan></text><rect x="778" y="126" width="320" height="108" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="938" y="158" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="938" dy="0">タスク詳細（サイドバー）</tspan></text><rect x="826" y="180" width="224" height="34" rx="12" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="938" y="202" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="938" dy="0">Frames</tspan></text><rect x="66" y="262" width="320" height="108" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="226" y="294" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="226" dy="0">タスク作成 / 編集</tspan></text><rect x="114" y="316" width="224" height="58" rx="12" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="226" y="338" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="226" dy="0">Frames</tspan><tspan x="226" dy="17">Streams</tspan><tspan x="226" dy="17">Stimulus</tspan></text><rect x="422" y="262" width="320" height="108" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="582" y="294" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="582" dy="0">コメント欄</tspan></text><rect x="470" y="316" width="224" height="46" rx="12" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="582" y="338" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="582" dy="0">Streams</tspan><tspan x="582" dy="17">Action Cable</tspan></text><rect x="778" y="262" width="320" height="108" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="938" y="294" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="938" dy="0">通知トースト / flash</tspan></text><rect x="826" y="316" width="224" height="58" rx="12" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="938" y="338" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="938" dy="0">Streams</tspan><tspan x="938" dy="17">Stimulus</tspan><tspan x="938" dy="17">Action Cable</tspan></text><text x="600" y="102" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="600" dy="0">1 画面に複数の技術を組み合わせる</tspan></text><text x="600" y="396" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="600" dy="0">役割ごとに技術を重ねると見通しがよい</tspan></text>
</svg>
