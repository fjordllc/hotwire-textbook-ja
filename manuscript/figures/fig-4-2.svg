<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">主要画面と使う技術の対応</title>
  <desc id="desc">Relay の主要画面に Turbo Drive、Frames、Streams、Stimulus、Action Cable を対応づけた図。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">主要画面と使う技術の対応</text>
  <rect x="36" y="84" width="1128" height="280" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="66" y="120" width="300" height="84" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="216" y="150" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="216" dy="0">プロジェクト一覧 / 詳細</tspan></text><rect x="158" y="164" width="116" height="24" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="216.0" y="182.0" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="216.0" dy="0">Drive</tspan></text><rect x="426" y="120" width="300" height="84" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="576" y="150" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="576" dy="0">タスク一覧（リスト / ボード）</tspan></text><rect x="518" y="164" width="116" height="24" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="576.0" y="182.0" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="576.0" dy="0">Frames + Stimulus</tspan></text><rect x="786" y="120" width="300" height="84" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="936" y="150" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="936" dy="0">タスク詳細（サイドバー）</tspan></text><rect x="878" y="164" width="116" height="24" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="936.0" y="182.0" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="936.0" dy="0">Frames</tspan></text><rect x="66" y="240" width="300" height="84" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="216" y="270" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="216" dy="0">タスク作成 / 編集</tspan></text><rect x="158" y="284" width="116" height="24" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="216.0" y="302.0" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="216.0" dy="0">Frames + Streams + Stimulus</tspan></text><rect x="426" y="240" width="300" height="84" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="576" y="270" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="576" dy="0">コメント欄</tspan></text><rect x="518" y="284" width="116" height="24" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="576.0" y="302.0" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="576.0" dy="0">Streams + Action Cable</tspan></text><rect x="786" y="240" width="300" height="84" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="936" y="270" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="936" dy="0">通知トースト / flash</tspan></text><rect x="878" y="284" width="116" height="24" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="936.0" y="302.0" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="936.0" dy="0">Streams + Stimulus + Action Cable</tspan></text><text x="600" y="102" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="600" dy="0">1 画面に複数の技術を組み合わせる</tspan></text>
</svg>
