<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Rails の仕組みと Hotwire の接続点</title>
  <desc id="desc">Rails の MVC、partial、REST、Action Cable が Turbo Drive/Frames、Streams、broadcast へつながることを示す対応図。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .label { font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">Rails の仕組みと Hotwire の接続点</text>
  <rect x="44" y="84" width="1112" height="290" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="94" y="130" width="300" height="42" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="806" y="130" width="300" height="42" rx="12" fill="#f0f9ff" stroke="#60a5fa" stroke-width="2"/><text x="244" y="157" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="244" dy="0">MVC で HTML を返す</tspan></text><text x="956" y="157" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #075985;"><tspan x="956" dy="0">Turbo Drive / Frames</tspan></text><line x1="398" y1="151" x2="790" y2="151" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="94" y="185" width="300" height="42" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="806" y="185" width="300" height="42" rx="12" fill="#f0f9ff" stroke="#60a5fa" stroke-width="2"/><text x="244" y="212" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="244" dy="0">partial</tspan></text><text x="956" y="212" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #075985;"><tspan x="956" dy="0">Turbo Streams</tspan></text><line x1="398" y1="206" x2="790" y2="206" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="94" y="240" width="300" height="42" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="806" y="240" width="300" height="42" rx="12" fill="#f0f9ff" stroke="#60a5fa" stroke-width="2"/><text x="244" y="267" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="244" dy="0">RESTful controller</tspan></text><text x="956" y="267" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #075985;"><tspan x="956" dy="0">Turbo Streams 応答</tspan></text><line x1="398" y1="261" x2="790" y2="261" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="94" y="295" width="300" height="42" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="806" y="295" width="300" height="42" rx="12" fill="#f0f9ff" stroke="#60a5fa" stroke-width="2"/><text x="244" y="322" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="244" dy="0">Action Cable</tspan></text><text x="956" y="322" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #075985;"><tspan x="956" dy="0">broadcast</tspan></text><line x1="398" y1="316" x2="790" y2="316" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><text x="600" y="120" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="600" dy="0">Rails の延長</tspan></text><text x="600" y="340" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="600" dy="0">別物ではなく、既存の仕組みの自然な接続</tspan></text>
</svg>
