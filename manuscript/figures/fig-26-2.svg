<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">モーダルの構成</title>
  <desc id="desc">modal frame + dialog + Stimulus open + 成功時 Streams close の流れを示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">モーダルの構成</text>
  <rect x="38" y="82" width="1124" height="280" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="80" y="152" width="180" height="72" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="170" y="180" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="170" dy="0">新規作成リンク</tspan></text><rect x="332" y="144" width="176" height="88" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="420" y="176" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="420" dy="0">modal frame</tspan></text><rect x="592" y="128" width="238" height="118" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="711" y="158" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="711" dy="0">&lt;dialog&gt;</tspan></text><text x="711" y="188" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="711" dy="0">Stimulus modal</tspan></text><rect x="886" y="140" width="238" height="100" rx="16" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="1005" y="168" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1005" dy="0">create.turbo_stream</tspan></text><text x="1005" y="196" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1005" dy="0">prepend + close + flash</tspan></text><line x1="260" y1="188" x2="324" y2="188" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><line x1="508" y1="188" x2="586" y2="188" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><line x1="830" y1="188" x2="878" y2="188" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><text x="711" y="308" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="711" dy="0">Esc で close / cleanup</tspan></text>
</svg>
