<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">インライン編集のフロー</title>
  <desc id="desc">タスク行の frame が表示と編集フォームを、保存・キャンセル・失敗で差し替え合う流れを示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">インライン編集のフロー</text>
  <rect x="36" y="84" width="1128" height="280" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="92" y="138" width="200" height="104" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="92" y="270" width="200" height="72" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><rect x="420" y="138" width="200" height="104" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><rect x="420" y="270" width="200" height="72" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="192" y="170" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="192" dy="0">表示</tspan></text><text x="192" y="204" text-anchor="middle" style="font: 600 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="192" dy="0">_task</tspan></text><text x="192" y="314" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="192" dy="0">編集リンク</tspan></text><text x="520" y="170" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="520" dy="0">編集</tspan></text><text x="520" y="204" text-anchor="middle" style="font: 600 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="520" dy="0">_form</tspan></text><text x="520" y="314" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="520" dy="0">保存 / キャンセル</tspan></text><line x1="292" y1="190" x2="416" y2="190" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><line x1="620" y1="190" x2="744" y2="190" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><rect x="760" y="138" width="164" height="104" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="948" y="138" width="164" height="104" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="842" y="170" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="842" dy="0">成功</tspan></text><text x="1030" y="170" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1030" dy="0">失敗</tspan></text><text x="842" y="204" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="842" dy="0">303 → 表示</tspan></text><text x="1030" y="204" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="1030" dy="0">422 → エラー</tspan></text>
</svg>
