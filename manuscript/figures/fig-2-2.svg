<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">JSON+SPA と HTML over the wire の通信比較</title>
  <desc id="desc">SPA は JSON を送りブラウザが画面を組み立てるのに対し、Hotwire は HTML を送りブラウザは差し替えるだけであることを対比する図。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .label { font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">JSON+SPA と HTML over the wire の通信比較</text>
  <rect x="42" y="84" width="1118" height="280" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="78" y="122" width="500" height="200" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="622" y="122" width="500" height="200" rx="18" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="328" y="150" text-anchor="middle" style="font: 700 20px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="328" dy="0">SPA</tspan></text><text x="872" y="150" text-anchor="middle" style="font: 700 20px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="872" dy="0">Hotwire</tspan></text><rect x="110" y="180" width="150" height="54" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="185.0" y="213.0" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="185.0" dy="0">サーバー</tspan></text><rect x="110" y="250" width="150" height="54" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="185.0" y="283.0" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="185.0" dy="0">JSON</tspan></text><rect x="290" y="180" width="150" height="54" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="365.0" y="213.0" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="365.0" dy="0">JavaScript</tspan></text><rect x="290" y="250" width="150" height="54" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="365.0" y="283.0" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="365.0" dy="0">DOM 構築</tspan></text><line x1="260" y1="207" x2="282" y2="207" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><line x1="260" y1="277" x2="282" y2="277" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="652" y="180" width="150" height="54" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="727.0" y="213.0" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="727.0" dy="0">サーバー</tspan></text><rect x="652" y="250" width="150" height="54" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="727.0" y="283.0" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="727.0" dy="0">HTML</tspan></text><rect x="832" y="180" width="150" height="54" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="907.0" y="213.0" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="907.0" dy="0">ブラウザ</tspan></text><rect x="832" y="250" width="150" height="54" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="907.0" y="283.0" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="907.0" dy="0">差し替え</tspan></text><line x1="802" y1="207" x2="824" y2="207" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><line x1="802" y1="277" x2="824" y2="277" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><text x="872" y="332" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="872" dy="0">画面を組み立てる場所が違う</tspan></text>
</svg>
