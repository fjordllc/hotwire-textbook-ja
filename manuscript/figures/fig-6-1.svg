<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">importmap の読み込み経路</title>
  <desc id="desc">application.js から importmap.rb の pin を通じて Turbo と Stimulus が読み込まれる経路を示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="440" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">importmap の読み込み経路</text>
  <rect x="38" y="82" width="1124" height="300" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="82" y="160" width="250" height="92" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="207" y="193" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="207" dy="0">application.js</tspan></text><text x="207" y="222" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="207" dy="0">import &quot;@hotwired/turbo-rails&quot;</tspan></text><rect x="390" y="136" width="254" height="140" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="517" y="170" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="517" dy="0">config/importmap.rb</tspan></text><text x="517" y="200" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="517" dy="0">pin Turbo / Stimulus</tspan></text><text x="517" y="230" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0e7490;"><tspan x="517" dy="0">ビルド不要</tspan></text><rect x="710" y="118" width="174" height="82" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="920" y="118" width="174" height="82" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="710" y="240" width="174" height="82" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="920" y="240" width="174" height="82" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="797" y="167" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="797" dy="0">Turbo</tspan></text><text x="1007" y="167" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1007" dy="0">Stimulus</tspan></text><text x="797" y="288" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="797" dy="0">controllers/</tspan></text><text x="1007" y="276" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1007" dy="0">eagerLoadControllers</tspan></text><text x="1007" y="296" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1007" dy="0">From()</tspan></text><line x1="332" y1="206" x2="382" y2="206" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><line x1="644" y1="206" x2="702" y2="159" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><line x1="644" y1="206" x2="702" y2="281" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><line x1="884" y1="159" x2="914" y2="159" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><line x1="884" y1="281" x2="914" y2="281" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><text x="600" y="360" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="600" dy="0">pin の定義から Turbo と Stimulus 周辺が読まれる</tspan></text>
</svg>
