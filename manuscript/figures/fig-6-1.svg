<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">importmap の読み込み経路</title>
  <desc id="desc">application.js から importmap.rb の pin を通じて Turbo と Stimulus が読み込まれる経路を示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">importmap の読み込み経路</text>
  <rect x="38" y="82" width="1124" height="280" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="88" y="160" width="240" height="84" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="208" y="192" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="208" dy="0">application.js</tspan></text><text x="208" y="220" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="208" dy="0">import &quot;@hotwired/turbo-rails&quot;</tspan></text><rect x="392" y="132" width="240" height="130" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="512" y="164" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="512" dy="0">config/importmap.rb</tspan></text><text x="512" y="194" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="512" dy="0">pin Turbo / Stimulus</tspan></text><text x="512" y="222" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0e7490;"><tspan x="512" dy="0">ビルド不要</tspan></text><rect x="700" y="110" width="168" height="86" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="906" y="110" width="168" height="86" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="700" y="250" width="168" height="86" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="906" y="250" width="168" height="86" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="784" y="158" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="784" dy="0">Turbo</tspan></text><text x="990" y="158" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="990" dy="0">Stimulus</tspan></text><text x="784" y="298" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="784" dy="0">controllers/</tspan></text><text x="990" y="298" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="990" dy="0">eagerLoadControllersFrom</tspan></text><line x1="328" y1="202" x2="384" y2="202" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><line x1="632" y1="202" x2="694" y2="158" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><line x1="632" y1="202" x2="694" y2="298" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><line x1="868" y1="158" x2="900" y2="158" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><line x1="868" y1="298" x2="900" y2="298" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" />
</svg>
