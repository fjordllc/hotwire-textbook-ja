<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Stimulus controller と data 属性</title>
  <desc id="desc">data-controller が HTML と controller を名前で結びつけ、Turbo の差し替えのたびに connect/disconnect が呼ばれることを示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .label { font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">Stimulus controller と data 属性</text>
  <rect x="36" y="82" width="1128" height="280" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="90" y="144" width="260" height="100" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="430" y="144" width="300" height="100" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><rect x="800" y="144" width="280" height="100" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="220" y="176" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="220" dy="0">HTML: data-controller=&quot;autofocus&quot;</tspan></text><text x="580" y="176" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #075985;"><tspan x="580" dy="0">autofocus_controller.js</tspan></text><text x="940" y="176" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="940" dy="0">connect / disconnect</tspan></text><line x1="350" y1="194" x2="424" y2="194" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><line x1="730" y1="194" x2="794" y2="194" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><text x="580" y="316" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="580" dy="0">Turbo 遷移のたびに再接続</tspan></text>
</svg>
