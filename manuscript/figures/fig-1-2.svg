<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Relay を育てる全体像</title>
  <desc id="desc">素の CRUD から各部で機能を足し、実務水準の Relay へ至る流れを示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="360" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .label { font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">Relay を育てる全体像</text>
  <rect x="30" y="78" width="1140" height="220" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="58" y="128" width="126" height="90" rx="14" fill="#f0f9ff" stroke="#60a5fa" stroke-width="2"/><text x="121" y="154" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0369a1;"><tspan x="121" dy="0">第2部</tspan></text><text x="121" y="184" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="121" dy="0">素の Rails CRUD</tspan></text><line x1="184" y1="173" x2="210" y2="173" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="196" y="128" width="126" height="90" rx="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="259" y="154" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0369a1;"><tspan x="259" dy="0">第3部</tspan></text><text x="259" y="184" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="259" dy="0">高速な遷移</tspan></text><line x1="322" y1="173" x2="348" y2="173" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="334" y="128" width="126" height="90" rx="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="397" y="154" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0369a1;"><tspan x="397" dy="0">第4部</tspan></text><text x="397" y="184" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="397" dy="0">部分更新</tspan></text><line x1="460" y1="173" x2="486" y2="173" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" /><rect x="472" y="128" width="126" height="90" rx="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="535" y="154" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0369a1;"><tspan x="535" dy="0