<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">Relay を育てる全体像</title>
  <desc id="desc">素の CRUD から各部で機能を足し、実務水準の Relay へ至る流れを示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="400" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .label { font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">Relay を育てる全体像</text>
  <rect x="30" y="78" width="1140" height="260" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="52" y="128" width="132" height="104" rx="14" fill="#f0f9ff" stroke="#60a5fa" stroke-width="2"/><text x="118" y="156" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0369a1;"><tspan x="118" dy="0">第2部</tspan></text><text x="118" y="188" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="118" dy="0">素の Rails</tspan><tspan x="118" dy="18">CRUD</tspan></text><line x1="184" y1="180" x2="206" y2="180" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><rect x="190" y="128" width="132" height="104" rx="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="256" y="156" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0369a1;"><tspan x="256" dy="0">第3部</tspan></text><text x="256" y="197" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="256" dy="0">高速な遷移</tspan></text><line x1="322" y1="180" x2="344" y2="180" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><rect x="328" y="128" width="132" height="104" rx="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="394" y="156" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0369a1;"><tspan x="394" dy="0">第4部</tspan></text><text x="394" y="197" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="394" dy="0">部分更新</tspan></text><line x1="460" y1="180" x2="482" y2="180" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><rect x="466" y="128" width="156" height="104" rx="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="544" y="156" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0369a1;"><tspan x="544" dy="0">第5部</tspan></text><text x="544" y="184" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="544" dy="0">画面遷移なし更新</tspan><tspan x="544" dy="17">リアルタイム</tspan></text><line x1="622" y1="180" x2="644" y2="180" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><rect x="650" y="128" width="132" height="104" rx="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="716" y="156" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0369a1;"><tspan x="716" dy="0">第6部</tspan></text><text x="716" y="197" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="716" dy="0">振る舞い</tspan></text><line x1="782" y1="180" x2="804" y2="180" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><rect x="810" y="128" width="132" height="104" rx="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="876" y="156" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0369a1;"><tspan x="876" dy="0">第7部</tspan></text><text x="876" y="197" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="876" dy="0">実務 UI</tspan></text><line x1="942" y1="180" x2="964" y2="180" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><rect x="970" y="128" width="132" height="104" rx="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="1036" y="156" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0369a1;"><tspan x="1036" dy="0">第8部</tspan></text><text x="1036" y="197" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1036" dy="0">保守</tspan></text><text x="1102" y="180" text-anchor="middle" style="font: 700 20px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0284c7;"><tspan x="1102" dy="0">+</tspan></text><rect x="1004" y="246" width="146" height="68" rx="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="1077" y="272" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0369a1;"><tspan x="1077" dy="0">第9部</tspan></text><text x="1077" y="297" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1077" dy="0">モバイル</tspan></text><text x="600" y="98" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #075985;"><tspan x="600" dy="0">Relay</tspan></text><text x="600" y="278" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="600" dy="0">1 つのアプリを段階的に育てる</tspan></text><text x="600" y="306" text-anchor="middle" style="font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b;"><tspan x="600" dy="0">第 9 部は Web-first な構成をモバイルへ広げる段階</tspan></text>
</svg>
