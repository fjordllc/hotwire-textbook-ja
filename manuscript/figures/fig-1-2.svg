14" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><text x="1087" y="154" text-anchor="middle" style="font: 700 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0369a1;"><tspan x="1087" dy="0">第9部</tspan></text><text x="1087" y="184" text-anchor="middle" style="font: 600 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1087" dy="0">モバイル</tspan></text><text x="600" y="98" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #075985;"><tspan x="600" dy="0">Relay</tspan></text><text x="600" y="245" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="600" dy="0">1 つのアプリを段階的に育てる</tspan></text>
</svg>
