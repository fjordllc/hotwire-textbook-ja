<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">snapshot cache とプレビュー</title>
  <desc id="desc">ページ離脱時のスナップショット保存と、戻る時のプレビューから最新差し替えまでの流れを示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">snapshot cache とプレビュー</text>
  <rect x="38" y="82" width="1124" height="280" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="86" y="150" width="168" height="86" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="170" y="182" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="170" dy="0">ページ A</tspan></text><text x="170" y="208" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="170" dy="0">表示</tspan></text><line x1="254" y1="193" x2="280" y2="193" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><rect x="296" y="150" width="168" height="86" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="380" y="182" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="380" dy="0">before-cache</tspan></text><text x="380" y="208" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="380" dy="0">スナップショット保存</tspan></text><line x1="464" y1="193" x2="490" y2="193" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><rect x="506" y="150" width="168" height="86" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="590" y="182" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="590" dy="0">ページ B</tspan></text><text x="590" y="208" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="590" dy="0">遷移</tspan></text><line x1="674" y1="193" x2="700" y2="193" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><rect x="716" y="150" width="168" height="86" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="800" y="182" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="800" dy="0">戻る</tspan></text><text x="800" y="208" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="800" dy="0">プレビュー表示</tspan></text><line x1="884" y1="193" x2="910" y2="193" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><rect x="926" y="150" width="168" height="86" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="1010" y="182" text-anchor="middle" style="font: 700 17px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1010" dy="0">最新取得</tspan></text><text x="1010" y="208" text-anchor="middle" style="font: 600 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="1010" dy="0">差し替え</tspan></text><text x="600" y="118" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="600" dy="0">プレビューは古い内容を一瞬見せる</tspan></text>
</svg>
