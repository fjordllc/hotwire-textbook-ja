<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">8 つのアクションの図解</title>
  <desc id="desc">append、prepend、replace、update、remove、before、after、refresh の 8 アクションが対象要素に与える効果を示す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .label { font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">8 つのアクションの図解</text>
  <rect x="34" y="72" width="1132" height="400" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="74" y="124" width="220" height="116" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="92" y="140" width="86" height="34" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="135.0" y="163.0" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="135.0" dy="0">append</tspan></text><text x="184" y="196" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #334155;"><tspan x="184" dy="0">末尾に追加</tspan></text><rect x="342" y="124" width="220" height="116" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="360" y="140" width="86" height="34" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="403.0" y="163.0" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="403.0" dy="0">prepend</tspan></text><text x="452" y="196" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #334155;"><tspan x="452" dy="0">先頭に追加</tspan></text><rect x="610" y="124" width="220" height="116" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="628" y="140" width="86" height="34" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="671.0" y="163.0" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="671.0" dy="0">replace</tspan></text><text x="720" y="196" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #334155;"><tspan x="720" dy="0">要素ごと置換</tspan></text><rect x="878" y="124" width="220" height="116" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="896" y="140" width="86" height="34" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="939.0" y="163.0" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="939.0" dy="0">update</tspan></text><text x="988" y="196" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #334155;"><tspan x="988" dy="0">中身だけ置換</tspan></text><rect x="74" y="294" width="220" height="116" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="92" y="310" width="86" height="34" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="135.0" y="333.0" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="135.0" dy="0">remove</tspan></text><text x="184" y="366" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #334155;"><tspan x="184" dy="0">削除</tspan></text><rect x="342" y="294" width="220" height="116" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="360" y="310" width="86" height="34" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="403.0" y="333.0" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="403.0" dy="0">before</tspan></text><text x="452" y="366" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #334155;"><tspan x="452" dy="0">直前に挿入</tspan></text><rect x="610" y="294" width="220" height="116" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="628" y="310" width="86" height="34" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="671.0" y="333.0" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="671.0" dy="0">after</tspan></text><text x="720" y="366" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #334155;"><tspan x="720" dy="0">直後に挿入</tspan></text><rect x="878" y="294" width="220" height="116" rx="14" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><rect x="896" y="310" width="86" height="34" rx="12" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><text x="939.0" y="333.0" text-anchor="middle" style="font: 700 16px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="939.0" dy="0">refresh</tspan></text><text x="988" y="366" text-anchor="middle" style="font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #334155;"><tspan x="988" dy="0">ページ再描画</tspan></text><text x="600" y="96" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="600" dy="0">replace と update の違いに注意</tspan></text>
</svg>
