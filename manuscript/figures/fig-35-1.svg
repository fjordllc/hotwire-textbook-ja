<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">Web 画面とネイティブ画面の混在と認証同期</title>
  <desc id="desc">ネイティブのログイン画面と Web のタスク一覧が同じアプリ内に混在し、認証セッションを WebView へ渡す図。</desc>
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="380" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">Web 画面とネイティブ画面の混在と認証同期</text>
  <rect x="38" y="82" width="1124" height="240" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="86" y="146" width="280" height="90" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="430" y="146" width="280" height="90" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><rect x="774" y="146" width="280" height="90" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="226" y="176" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="226" dy="0">Native login</tspan></text><text x="226" y="204" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="226" dy="0">cookie / token</tspan></text><text x="570" y="176" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="570" dy="0">WebView</tspan></text><text x="570" y="204" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0e7490;"><tspan x="570" dy="0">Relay の一覧</tspan></text><text x="914" y="176" text-anchor="middle" style="font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="914" dy="0">同期</tspan></text><text x="914" y="204" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569;"><tspan x="914" dy="0">認証セッション</tspan></text><line x1="366" y1="191" x2="424" y2="191" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" /><line x1="710" y1="191" x2="768" y2="191" stroke="#0284c7" stroke-width="2.5" fill="none" marker-end="url(#arrow)" />
</svg>
