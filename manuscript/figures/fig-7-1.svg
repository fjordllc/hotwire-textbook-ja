<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Turbo Drive のページ置換</title>
  <desc id="desc">通常遷移はページ全体を作り直すが、visit は head をマージして body だけ差し替えることを対比する図。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect width="1200" height="360" fill="#ffffff"/>
  <style>
    .title { font: 700 28px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .label { font: 700 18px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a; }
    .small { font: 600 15px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #475569; }
    .tiny { font: 500 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #64748b; }
  </style>
  <text x="44" y="42" class="title">Turbo Drive のページ置換</text>
  <rect x="40" y="86" width="1120" height="230" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="88" y="122" width="468" height="150" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><rect x="644" y="122" width="468" height="150" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="322" y="150" text-anchor="middle" style="font: 700 20px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="322" dy="0">通常遷移</tspan></text><text x="878" y="150" text-anchor="middle" style="font: 700 20px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #075985;"><tspan x="878" dy="0">Turbo Drive visit</tspan></text><rect x="136" y="188" width="120" height="34" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><rect x="276" y="188" width="120" height="34" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><rect x="416" y="188" width="86" height="34" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="196" y="210" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="196" dy="0">head</tspan></text><text x="336" y="210" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="336" dy="0">body</tspan></text><text x="459" y="210" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="459" dy="0">白い再描画</tspan></text><rect x="694" y="132" width="120" height="34" rx="10" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/><rect x="834" y="188" width="176" height="50" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="2"/><rect x="1030" y="188" width="58" height="50" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="2"/><text x="754" y="154" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="754" dy="0">head マージ</tspan></text><text x="922" y="220" text-anchor="middle" style="font: 700 14px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="922" dy="0">body 差し替え</tspan></text><text x="1059" y="220" text-anchor="middle" style="font: 700 13px 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0f172a;"><tspan x="1059" dy="0">保持</tspan></text><line x1="556" y1="198" x2="640" y2="198" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow)" />
</svg>
